# Blueprint Render pour VoidSector (mode test)
# Usage : dans Render, choisir "New +" > "Blueprint" et connecter le repo GitHub.
# Le package.json racine redirige vers server/.
# En mode "development", le serveur accepte CLIENT_ORIGIN=*, pas de DATABASE_URL et LOAD_TEST_ENABLED=true.
# Pour une vraie production, passer NODE_ENV=production et ajouter une base PostgreSQL (DATABASE_URL).

services:
  - type: web
    name: voidsector-server
    runtime: node
    region: frankfurt
    branch: main
    buildCommand: npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: development
      - key: CLIENT_ORIGIN
        value: "*"
      - key: LOAD_TEST_ENABLED
        value: "true"
      - key: LOAD_TEST_SECRET
        generateValue: true
        # Change cette valeur si tu veux un secret fixe pour les tests de charge.
