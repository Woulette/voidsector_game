        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.98 0 0 0 0 0.57 0 0 0 0 0.24 0 0 0 0.9 0"/>
