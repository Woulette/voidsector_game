<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 260" role="img" aria-label="Vaisseau spatial">
  
    <defs>
      <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.22 0 0 0 0 0.74 0 0 0 0 0.97 0 0 0 0.9 0"/>
        <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <linearGradient id="body" x1="0" x2="1" y1="0" y2="1">
        <stop offset="0%" stop-color="#cbd5e1"/>
        <stop offset="50%" stop-color="#111827"/>
        <stop offset="100%" stop-color="#38bdf8"/>
      </linearGradient>
      <linearGradient id="accent" x1="0" x2="1">
        <stop offset="0%" stop-color="#60a5fa"/>
        <stop offset="100%" stop-color="#38bdf8"/>
      </linearGradient>
      <radialGradient id="core" cx="50%" cy="50%" r="60%">
        <stop offset="0%" stop-color="#e0f2fe"/>
        <stop offset="50%" stop-color="#38bdf8"/>
        <stop offset="100%" stop-color="transparent"/>
      </radialGradient>
    </defs>
    
  <g filter="url(#glow)" opacity="0.75">
    <ellipse cx="90" cy="130" rx="26" ry="7" fill="#38bdf8"/>
    <ellipse cx="330" cy="130" rx="26" ry="7" fill="#38bdf8"/>
  </g>
  <g>
    
        <circle cx="210" cy="130" r="82" fill="none" stroke="url(#body)" stroke-width="30" opacity=".95"/>
        <polygon points="210,58 255,130 210,202 165,130" fill="#0f172a" stroke="#38bdf8" stroke-width="3"/>
        <polygon points="210,78 235,130 210,180 185,130" fill="url(#body)"/>
        <circle cx="210" cy="130" r="13" fill="url(#core)" filter="url(#glow)"/>
        
    <g opacity=".95">
      <circle cx="210" cy="130" r="8" fill="url(#core)" filter="url(#glow)"/>
      <rect x="198" y="215" width="24" height="22" rx="10" fill="#38bdf8" opacity=".85" filter="url(#glow)"/>
      <rect x="188" y="28" width="44" height="8" rx="4" fill="#e0f2fe" opacity=".55"/>
    </g>
  </g>
</svg>