<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 260" role="img" aria-label="Vaisseau spatial">
  
    <defs>
      <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.38 0 0 0 0 0.65 0 0 0 0 0.98 0 0 0 0.9 0"/>
        <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <linearGradient id="body" x1="0" x2="1" y1="0" y2="1">
        <stop offset="0%" stop-color="#64748b"/>
        <stop offset="50%" stop-color="#111827"/>
        <stop offset="100%" stop-color="#60a5fa"/>
      </linearGradient>
      <linearGradient id="accent" x1="0" x2="1">
        <stop offset="0%" stop-color="#38bdf8"/>
        <stop offset="100%" stop-color="#60a5fa"/>
      </linearGradient>
      <radialGradient id="core" cx="50%" cy="50%" r="60%">
        <stop offset="0%" stop-color="#e0f2fe"/>
        <stop offset="50%" stop-color="#60a5fa"/>
        <stop offset="100%" stop-color="transparent"/>
      </radialGradient>
    </defs>
    
  <g filter="url(#glow)" opacity="0.75">
    <ellipse cx="90" cy="130" rx="26" ry="7" fill="#60a5fa"/>
    <ellipse cx="330" cy="130" rx="26" ry="7" fill="#60a5fa"/>
  </g>
  <g>
    
        <rect x="98" y="54" width="224" height="130" rx="48" fill="url(#body)" stroke="#60a5fa" stroke-width="3"/>
        <rect x="52" y="86" width="78" height="78" rx="25" fill="#1f2937" stroke="#64748b" stroke-width="3"/>
        <rect x="290" y="86" width="78" height="78" rx="25" fill="#1f2937" stroke="#64748b" stroke-width="3"/>
        <polygon points="210,28 255,74 210,62 165,74" fill="#38bdf8" opacity=".7"/>
        <polygon points="210,230 258,178 210,192 162,178" fill="#38bdf8" opacity=".55"/>
        
    <g opacity=".95">
      <circle cx="210" cy="130" r="8" fill="url(#core)" filter="url(#glow)"/>
      <rect x="198" y="215" width="24" height="22" rx="10" fill="#60a5fa" opacity=".85" filter="url(#glow)"/>
      <rect x="188" y="28" width="44" height="8" rx="4" fill="#e0f2fe" opacity=".55"/>
    </g>
  </g>
</svg>