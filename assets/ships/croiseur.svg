<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 260" role="img" aria-label="Vaisseau spatial">
  
    <defs>
      <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.05 0 0 0 0 0.65 0 0 0 0 0.91 0 0 0 0.9 0"/>
        <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <linearGradient id="body" x1="0" x2="1" y1="0" y2="1">
        <stop offset="0%" stop-color="#64748b"/>
        <stop offset="50%" stop-color="#111827"/>
        <stop offset="100%" stop-color="#0ea5e9"/>
      </linearGradient>
      <linearGradient id="accent" x1="0" x2="1">
        <stop offset="0%" stop-color="#38bdf8"/>
        <stop offset="100%" stop-color="#0ea5e9"/>
      </linearGradient>
      <radialGradient id="core" cx="50%" cy="50%" r="60%">
        <stop offset="0%" stop-color="#e0f2fe"/>
        <stop offset="50%" stop-color="#0ea5e9"/>
        <stop offset="100%" stop-color="transparent"/>
      </radialGradient>
    </defs>
    
  <g filter="url(#glow)" opacity="0.75">
    <ellipse cx="90" cy="130" rx="26" ry="7" fill="#0ea5e9"/>
    <ellipse cx="330" cy="130" rx="26" ry="7" fill="#0ea5e9"/>
  </g>
  <g>
    
        <polygon points="44,143 196,48 378,34 312,130 380,226 196,208" fill="url(#body)" stroke="#0ea5e9" stroke-width="3"/>
        <polygon points="122,143 218,98 330,90 260,132 332,170 218,186" fill="#111827" stroke="#38bdf8" stroke-width="2"/>
        <rect x="206" y="119" width="78" height="18" rx="9" fill="#0ea5e9" filter="url(#glow)"/>
        <rect x="190" y="150" width="58" height="14" rx="7" fill="#38bdf8" opacity=".85"/>
        
    <g opacity=".95">
      <circle cx="210" cy="130" r="8" fill="url(#core)" filter="url(#glow)"/>
      <rect x="198" y="215" width="24" height="22" rx="10" fill="#0ea5e9" opacity=".85" filter="url(#glow)"/>
      <rect x="188" y="28" width="44" height="8" rx="4" fill="#e0f2fe" opacity=".55"/>
    </g>
  </g>
