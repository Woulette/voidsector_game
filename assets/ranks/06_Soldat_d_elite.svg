<path d="M 14.0 64.0 L 64.0 91.0 L 114.0 64.0" fill="none" stroke="#000000" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round" opacity=".55"/>
<path d="M 25.0 45.0 L 64.0 69.0 L 103.0 45.0" fill="none" stroke="#ffffff" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round" opacity=".42"/>

