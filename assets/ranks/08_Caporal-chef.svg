<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">

  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f2e8"/>
      <stop offset="20%" stop-color="#8e8980"/>
      <stop offset="50%" stop-color="#1e211f"/>
      <stop offset="72%" stop-color="#b9b4a8"/>
      <stop offset="100%" stop-color="#3f3d39"/>
    </linearGradient>
    <linearGradient id="steel2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
