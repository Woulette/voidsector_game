<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">

  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f2e8"/>
      <stop offset="20%" stop-color="#8e8980"/>
      <stop offset="50%" stop-color="#1e211f"/>
      <stop offset="72%" stop-color="#b9b4a8"/>
      <stop offset="100%" stop-color="#3f3d39"/>
    </linearGradient>
    <linearGradient id="steel2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="24%" stop-color="#bfc4c6"/>
      <stop offset="48%" stop-color="#383b3d"/>
      <stop offset="75%" stop-color="#8f9698"/>
      <stop offset="100%" stop-color="#0c0d0f"/>
    </linearGradient>
    <linearGradient id="darkMetal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#343536"/>
      <stop offset="45%" stop-color="#070808"/>
      <stop offset="100%" stop-color="#5a5c5d"/>
    </linearGradient>
    <linearGradient id="blueCore" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#002cc8"/>
      <stop offset="28%" stop-color="#02b7ff"/>
      <stop offset="50%" stop-color="#d7ffff"/>
      <stop offset="72%" stop-color="#0095ff"/>
      <stop offset="100%" stop-color="#001da7"/>
    </linearGradient>
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cbffff" stop-opacity=".95"/>
      <stop offset="45%" stop-color="#00aaff" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#003bff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="copper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff2c0"/>
      <stop offset="18%" stop-color="#ff9c42"/>
      <stop offset="48%" stop-color="#6e2100"/>
      <stop offset="76%" stop-color="#c45b00"/>
      <stop offset="100%" stop-color="#ffd16a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7af"/>
      <stop offset="20%" stop-color="#ffbd20"/>
      <stop offset="44%" stop-color="#7a3d00"/>
      <stop offset="70%" stop-color="#e98a00"/>
      <stop offset="100%" stop-color="#fff06a"/>
    </linearGradient>
    <linearGradient id="redGem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b25"/>
      <stop offset="45%" stop-color="#a5120b"/>
      <stop offset="100%" stop-color="#430007"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity=".75"/>
    </filter>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g filter="url(#shadow)">
<polygon points="17.0,34.0 28.0,26.0 64.0,50.0 100.0,26.0 111.0,34.0 64.0,68.0" fill="url(#steel2)" stroke="#080808" stroke-width="2" stroke-linejoin="round" />
<polygon points="27.0,38.0 61.0,61.0 62.0,49.0 35.0,31.0" fill="url(#darkMetal)" stroke="#bbb" stroke-width="0.9" stroke-linejoin="round" />
<polygon points="101.0,38.0 67.0,61.0 66.0,49.0 93.0,31.0" fill="url(#darkMetal)" stroke="#bbb" stroke-width="0.9" stroke-linejoin="round" />
<path d="M 42.0 58.0 L 64.0 70.0 L 86.0 58.0" fill="none" stroke="#009dff" stroke-width="4" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)" opacity=".95"/>
<path d="M 48.0 56.0 L 64.0 64.0 L 80.0 56.0" fill="none" stroke="#eaffff" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round" opacity=".85"/>
<polygon points="17.0,52.0 28.0,44.0 64.0,68.0 100.0,44.0 111.0,52.0 64.0,86.0" fill="url(#steel2)" stroke="#080808" stroke-width="2" stroke-linejoin="round" />
<polygon points="27.0,56.0 61.0,79.0 62.0,67.0 35.0,49.0" fill="url(#darkMetal)" stroke="#bbb" stroke-width="0.9" stroke-linejoin="round" />
<polygon points="101.0,56.0 67.0,79.0 66.0,67.0 93.0,49.0" fill="url(#darkMetal)" stroke="#bbb" stroke-width="0.9" stroke-linejoin="round" />
<path d="M 42.0 76.0 L 64.0 88.0 L 86.0 76.0" fill="none" stroke="#009dff" stroke-width="4" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)" opacity=".95"/>
<path d="M 48.0 74.0 L 64.0 82.0 L 80.0 74.0" fill="none" stroke="#eaffff" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round" opacity=".85"/>

  </g>
</svg>
