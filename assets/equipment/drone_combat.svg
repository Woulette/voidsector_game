      </linearGradient>
      <radialGradient id="energy" cx="50%" cy="50%" r="60%">
        <stop offset="0%" stop-color="#fff"/>
        <stop offset="45%" stop-color="#60a5fa"/>
        <stop offset="100%" stop-color="transparent"/>
      </radialGradient>
    </defs>
