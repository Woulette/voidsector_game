<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240">

    <defs>
      <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
        <feGaussianBlur stdDeviation="5" result="blur"/>
